<style>
  :root{
    --bg:#FBF7EE; --surface:#FFFFFF; --border:#E6DCC6;
    --teal:#0E6E5E; --gold:#B8860B; --gold-bright:#D89B1F;
    --ink:#20281F; --ink-muted:#8A8070;
    --font-display:'Tajawal',sans-serif; --font-body:'Cairo',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(184,134,11,.08), transparent 60%), var(--bg);
    color:var(--ink);font-family:var(--font-body);font-weight:600;min-height:100vh;

  }
  .box{max-width:440px;}
  .logo-mark{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--gold-bright),var(--gold) 75%);box-shadow:0 6px 18px rgba(184,134,11,.32);margin:0 auto 24px;}
  .code{font-family:var(--font-display);font-weight:900;font-size:64px;color:var(--gold);line-height:1;margin-bottom:10px;}
  h1{font-family:var(--font-display);font-weight:900;font-size:22px;margin-bottom:10px;color:var(--ink);}
  p{font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink-muted);margin-bottom:28px;line-height:1.7;}
  .home-btn{
    display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;text-decoration:none;
    font-family:var(--font-body);font-weight:700;font-size:14px;padding:12px 26px;border-radius:24px;
  }
  .home-btn:hover{opacity:.9;}
