name: Update Gold & Currency Prices

on:
  schedule:
    # Every 15 minutes. GitHub may delay this slightly under high load — that's normal
    # and out of our control, not a bug.
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # lets you manually trigger a run from the Actions tab, for testing

permissions:
  contents: write # needed so the workflow can commit the updated prices.json back to the repo

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node update-prices.js

      - name: Commit updated prices.json
        run: |
          git config user.name "egydahab-price-bot"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update prices [automated]"
          git push
