<style>
  :root{
    --bg:#FBF7EE; --surface:#FFFFFF; --surface-2:#F4EEDF; --border:#E6DCC6;
    --teal:#0E6E5E; --teal-deep:#0A5346; --gold:#B8860B; --gold-bright:#D89B1F;
    --ink:#20281F; --ink-muted:#8A8070;
    --font-display:'Tajawal',sans-serif; --font-body:'Cairo',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse 900px 500px at 12% -8%, rgba(14,110,94,.07), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 10%, rgba(184,134,11,.08), transparent 60%), var(--bg);
    color:var(--ink);font-family:var(--font-body);font-weight:600;min-height:100vh;line-height:1.6;
  }
  .app{max-width:760px;margin:0 auto;padding:0 20px 80px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:30px 0 22px;border-bottom:1px solid var(--border);margin-bottom:40px;flex-wrap:wrap;gap:12px;}
  .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .logo-mark{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--gold-bright),var(--gold) 75%);box-shadow:0 3px 12px rgba(184,134,11,.32);flex-shrink:0;}
  .logo-text{font-family:var(--font-display);font-weight:900;font-size:20px;letter-spacing:.5px;color:var(--teal);}
  .logo-text .sub{display:block;font-family:var(--font-display);font-weight:800;font-size:11.5px;color:var(--teal);letter-spacing:1.2px;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .lang-toggle{background:var(--surface);border:1px solid var(--border);color:var(--ink);font-family:var(--font-mono);font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;letter-spacing:1px;}
  .lang-toggle:hover{border-color:var(--teal);color:var(--teal);}
  .icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--ink-muted);cursor:pointer;}
  .icon-btn svg{width:16px;height:16px;stroke:currentColor;}
  .icon-btn:hover{border-color:var(--teal);color:var(--teal);}
  .contact-btn{display:flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--teal);text-decoration:none;font-family:var(--font-body);font-weight:700;font-size:12.5px;}
  .contact-btn svg{width:15px;height:15px;stroke:currentColor;flex-shrink:0;}
  .contact-btn:hover{border-color:var(--teal);}
  .menu-wrap{position:relative;}
  .menu-dropdown{display:none;position:absolute;top:calc(100% + 8px);inset-inline-end:0;min-width:190px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(32,40,31,.14);overflow:hidden;z-index:20;}
  .menu-dropdown.open{display:block;}
  .menu-dropdown a{display:block;padding:12px 16px;font-family:var(--font-body);font-weight:700;font-size:13px;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--border);}
  .menu-dropdown a:last-child{border-bottom:none;}
  .menu-dropdown a:hover{background:var(--surface-2);color:var(--teal);}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-weight:700;font-size:13px;color:var(--teal);text-decoration:none;margin-bottom:24px;}
  .back-link:hover{text-decoration:underline;}
  h1{font-family:var(--font-display);font-weight:900;font-size:29px;margin-bottom:6px;color:var(--ink);}
  .updated{font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);margin-bottom:30px;}
  .policy-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 6px 24px rgba(32,40,31,.06);}
  .policy-card p{font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:16px;}
  .policy-card h2{font-family:var(--font-display);font-weight:800;font-size:16.5px;color:var(--teal);margin:24px 0 10px;}
  .policy-card h2:first-child{margin-top:0;}
  .policy-card ul,.policy-card ol{padding-inline-start:20px;margin-bottom:16px;}
  .policy-card li{font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:8px;line-height:1.7;}
  .policy-card a{color:var(--teal);font-weight:700;}
  footer{text-align:center;padding-top:24px;margin-top:48px;border-top:1px solid var(--border);}
  .footer-nav{display:flex;justify-content:center;gap:18px;margin-bottom:16px;flex-wrap:wrap;}
  .footer-nav a{font-family:var(--font-body);font-weight:700;font-size:12.5px;color:var(--teal);text-decoration:none;}
  .footer-nav a:hover{text-decoration:underline;}
  .copyright-line{font-family:var(--font-body);font-weight:600;font-size:11.5px;color:var(--ink-muted);}
  @media(max-width:480px){ .policy-card{padding:22px 18px;} h1{font-size:23px;} }
</style>

    copyright: '© 2026 إيجي دهب. جميع الحقوق محفوظة.',
    body: `
      <p>باستخدامك موقع إيجي دهب (Egydahab)، فإنك توافق على الشروط والأحكام التالية. يُرجى قراءتها بعناية قبل استخدام الموقع.</p>

      </ul>
      <h2>4. الملكية الفكرية</h2>
      <p>تصميم الموقع، الشعار، والمحتوى الأصلي مملوكون لإيجي دهب. لا يجوز نسخ أو إعادة نشر محتوى الموقع دون إذن كتابي مسبق، باستثناء الاستخدام الشخصي غير التجاري.</p>
      <h2>5. روابط خارجية</h2>
      <p>قد يحتوي الموقع على روابط لمواقع خارجية (مثل مصادر بيانات الأسعار أو Google). نحن غير مسؤولين عن محتوى أو سياسات هذه المواقع.</p>
      <h2>6. تحديد المسؤولية</h2>
      <p>لا يتحمل إيجي دهب أي مسؤولية عن أي خسائر أو أضرار مباشرة أو غير مباشرة تنتج عن استخدام الموقع أو الاعتماد على المعلومات المعروضة فيه.</p>
      <h2>7. التعديلات</h2>
      <p>نحتفظ بالحق في تعديل هذه الشروط في أي وقت. استمرارك في استخدام الموقع بعد أي تعديل يُعتبر موافقة على الشروط المحدَّثة.</p>

    `

  en: {
    brand: 'Egydahab<span class="sub">إيجي دهب</span>',
    contactLabel: 'Contact',
    menuHome: 'Home', menuAbout: 'About Us', menuArticles: 'Articles', menuOtherCurrencies: 'Other Currencies',
    menuContact: 'Contact', menuPrivacy: 'Privacy Policy', menuTerms: 'Terms & Conditions', menuDisclaimer: 'Disclaimer',
    back: '← Back to home',
    title: 'Terms & Conditions',
    updatedLabel: 'Last updated: ',
    copyright: '© 2026 Egydahab. All rights reserved.',
    body: `
      <p>By using the Egydahab website, you agree to the following terms and conditions. Please read them carefully before using the site.</p>
      <h2>1. Nature of the Service</h2>
      <p>Egydahab is an informational website that displays approximate gold, silver, and foreign currency prices against the Egyptian Pound, based on public data sources. The site does not buy, sell, or broker any financial or commercial transactions.</p>

      <h2>6. Limitation of Liability</h2>

      <h2>7. Changes to These Terms</h2>

      <h2>9. Contact</h2>
      <p>For any questions about these terms, please reach out via our <a href="contact.html">Contact page</a>.</p>
    `
  }
};
let lang = 'ar';
function formatToday(){
  const d = new Date();
  return lang === 'ar'
    ? d.toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'})
    : d.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
}
function applyLang(){
  const t = dict[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t[el.getAttribute('data-i18n')]; });
  document.getElementById('langBtn').textContent = lang === 'ar' ? 'EN' : 'AR';
  document.getElementById('policyContent').innerHTML = t.body;
  document.getElementById('updatedDate').textContent = formatToday();
}
document.getElementById('langBtn').onclick = () => { lang = lang === 'ar' ? 'en' : 'ar'; applyLang(); };
document.getElementById('menuBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('menuDropdown').classList.toggle('open'); };
document.addEventListener('click', (e) => {
  const dropdown = document.getElementById('menuDropdown');
  const btn = document.getElementById('menuBtn');
  if(dropdown.classList.contains('open') && !dropdown.contains(e.target) && e.target !== btn){ dropdown.classList.remove('open'); }
});
applyLang();
</script>
