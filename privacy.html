<style>
  :root{
    --bg:#FBF7EE; --surface:#FFFFFF; --surface-2:#F4EEDF; --border:#E6DCC6;
    --teal:#0E6E5E; --teal-deep:#0A5346; --gold:#B8860B; --gold-bright:#D89B1F;
    --ink:#20281F; --ink-muted:#8A8070;
    --font-display:'Tajawal',sans-serif; --font-body:'Cairo',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse 900px 500px at 12% -8%, rgba(14,110,94,.07), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 10%, rgba(184,134,11,.08), transparent 60%), var(--bg);
    color:var(--ink);font-family:var(--font-body);font-weight:600;min-height:100vh;line-height:1.6;
  }
  .app{max-width:760px;margin:0 auto;padding:0 20px 80px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:30px 0 22px;border-bottom:1px solid var(--border);margin-bottom:40px;flex-wrap:wrap;gap:12px;}
  .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .logo-mark{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--gold-bright),var(--gold) 75%);box-shadow:0 3px 12px rgba(184,134,11,.32);}
  .logo-text{font-family:var(--font-display);font-weight:900;font-size:20px;letter-spacing:.5px;color:var(--ink);}
  .logo-text .sub{display:block;font-family:var(--font-display);font-weight:800;font-size:11.5px;color:var(--teal);letter-spacing:1.2px;text-transform:uppercase;}
  .lang-toggle{background:var(--surface);border:1px solid var(--border);color:var(--ink);font-family:var(--font-mono);font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;letter-spacing:1px;}
  .lang-toggle:hover{border-color:var(--teal);color:var(--teal);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--ink-muted);cursor:pointer;}
  .icon-btn svg{width:16px;height:16px;stroke:currentColor;}
  .icon-btn:hover{border-color:var(--teal);color:var(--teal);}
  .contact-btn{display:flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--teal);text-decoration:none;font-family:var(--font-body);font-weight:700;font-size:12.5px;}
  .contact-btn svg{width:15px;height:15px;stroke:currentColor;flex-shrink:0;}
  .contact-btn:hover{border-color:var(--teal);}
  .menu-wrap{position:relative;}
  .menu-dropdown{display:none;position:absolute;top:calc(100% + 8px);inset-inline-end:0;min-width:190px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(32,40,31,.14);overflow:hidden;z-index:20;}
  .menu-dropdown.open{display:block;}
  .menu-dropdown a{display:block;padding:12px 16px;font-family:var(--font-body);font-weight:700;font-size:13px;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--border);}
  .menu-dropdown a:last-child{border-bottom:none;}
  .menu-dropdown a:hover{background:var(--surface-2);color:var(--teal);}
  .footer-nav{display:flex;justify-content:center;gap:18px;margin-bottom:16px;flex-wrap:wrap;}
  .footer-nav a{font-family:var(--font-body);font-weight:700;font-size:12.5px;color:var(--teal);text-decoration:none;}
  .footer-nav a:hover{text-decoration:underline;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-weight:700;font-size:13px;color:var(--teal);text-decoration:none;margin-bottom:24px;}
  .back-link:hover{text-decoration:underline;}
  h1{font-family:var(--font-display);font-weight:900;font-size:29px;margin-bottom:6px;color:var(--ink);}
  .updated{font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);margin-bottom:30px;}
  .policy-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 6px 24px rgba(32,40,31,.06);}
  .policy-card p{font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:16px;}
  .policy-card h2{font-family:var(--font-display);font-weight:800;font-size:17px;color:var(--teal);margin:26px 0 10px;}
  .policy-card h2:first-child{margin-top:0;}
  .policy-card ul{padding-inline-start:20px;margin-bottom:16px;}
  .policy-card li{font-family:var(--font-body);font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:8px;}
  .policy-card a{color:var(--teal);font-weight:700;}
  footer{text-align:center;padding-top:24px;margin-top:48px;border-top:1px solid var(--border);}
  .copyright-line{font-family:var(--font-body);font-weight:600;font-size:11.5px;color:var(--ink-muted);}
  @media(max-width:480px){ .policy-card{padding:22px 18px;} h1{font-size:23px;} }

<script>
const dict = {
  ar: {
    brand: 'إيجي دهب<span class="sub">Egydahab</span>',
    contactLabel: 'تواصل معنا',
    menuHome: 'الرئيسية', menuAbout: 'من نحن', menuArticles: 'المقالات', menuOtherCurrencies: 'عملات أخرى',
    menuContact: 'تواصل معنا', menuTerms: 'الشروط والأحكام', menuDisclaimer: 'إخلاء المسؤولية',
    back: '→ الرجوع للرئيسية',
    title: 'سياسة الخصوصية',
    updatedLabel: 'آخر تحديث: ',
    copyright: '© 2026 إيجي دهب. جميع الحقوق محفوظة.',
    body: `
      <p>مرحباً بك في إيجي دهب (Egydahab). موقع متخصص في عرض أسعار الذهب اليوم في مصر وأسعار صرف العملات الأجنبية. تصف هذه الصفحة كيف نتعامل مع بياناتك عند استخدامك للموقع.</p>

      <h2>المعلومات التي نسجلها</h2>
      <ul>
        <li>معلومات فنية عامة مثل نوع الجهاز، نوع المتصفح، نظام التشغيل، وعنوان الـ IP التقريبي (يُستخدم عادةً لتحديد الدولة/المدينة فقط، وليس موقعك الدقيق).</li>
        <li>بيانات الاستخدام العامة، مثل الصفحات التي تمت زيارتها ومدة الزيارة، عبر أدوات تحليل قياسية.</li>
        <li>ملفات تعريف الارتباط (Cookies) الموضحة بالتفصيل أدناه.</li>
      </ul>
      <p>نحن <strong>لا نطلب ولا نجمع</strong> بيانات حساسة مثل الاسم الكامل أو رقم الهاتف أو بيانات الحسابات البنكية عبر استخدامك العادي للموقع. البريد الإلكتروني الذي تشاركه معنا طوعًا عبر صفحة "اتصل بنا" يُستخدم فقط للرد على استفسارك.</p>

      <h2>ملفات تعريف الارتباط (Cookies)</h2>
      <p>نستخدم نوعين رئيسيين من الكوكيز:</p>
      <ul>
        <li><strong>كوكيز ضرورية:</strong> لتشغيل الموقع بشكل أساسي (مثل تذكر اختيارك للغة العربية أو الإنجليزية).</li>
        <li><strong>كوكيز إعلانية وتحليلية:</strong> تُستخدم بواسطة Google AdSense وأدوات التحليل لعرض إعلانات مناسبة وفهم كيفية استخدام الزوار للموقع.</li>
      </ul>
      <p>يمكنك حذف أو حظر الكوكيز من إعدادات متصفحك في أي وقت، لكن هذا قد يؤثر على بعض وظائف الموقع.</p>

      <h2>كيف نستخدم هذه المعلومات</h2>
      <ul>
        <li>لعرض أسعار الذهب والعملات بشكل دقيق ومحدث.</li>
        <li>لتحليل حركة الزوار ومعرفة المحتوى المفيد وتحسين تجربة الاستخدام.</li>
        <li>لعرض الإعلانات من خلال برنامج Google AdSense وقياس أدائها.</li>
        <li>للرد على استفساراتكم المرسلة عبر صفحة التواصل.</li>
      </ul>

      <h2>خدمات ومصادر بيانات خارجية</h2>
      <p>لعرض الأسعار، يعتمد الموقع على واجهات بيانات مالية عامة (مصادر أسعار الذهب والعملات) لا تتضمن أي بيانات شخصية عنك. أما لعرض الإعلانات، فنستخدم Google AdSense. قد تجمع Google بعض البيانات حسب سياسة الخصوصية الخاصة بها، ويمكنك الاطلاع عليها من هنا: <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a></p>

      <h2>الاحتفاظ بالبيانات</h2>
      <p>بيانات الاستخدام العامة وسجلات الزيارة يتم الاحتفاظ بها للمدة اللازمة فقط لتحليل الأداء وتحسين الموقع. رسائل التواصل عبر البريد الإلكتروني يتم الاحتفاظ بها للمدة اللازمة للرد على استفسارك ومتابعته.</p>

      <h2>خصوصية الأطفال</h2>
      <p>هذا الموقع غير موجَّه للأطفال دون سن 13 عامًا، ولا نجمع عن قصد بيانات شخصية من الأطفال. إذا كنت ولي أمر وتعتقد أن طفلك قدَّم لنا بيانات، يُرجى التواصل معنا لحذفها.</p>

      <h2>مشاركة البيانات</h2>
      <ul>
        <li>لا نبيع أي بيانات شخصية لأي طرف ثالث.</li>
        <li>قد نشارك بيانات غير شخصية ومجمَّعة (Aggregated) مع شركاء تقنيين لأغراض الإعلان والتحليل فقط.</li>
      </ul>

      <h2>حقوقك</h2>
      <ul>
        <li>يمكنك إدارة الكوكيز أو تعطيلها من إعدادات متصفحك في أي وقت.</li>
        <li>يمكنك طلب معرفة أو حذف أي بيانات شخصية شاركتها معنا طوعًا (مثل بريدك الإلكتروني عبر نموذج التواصل) بالتواصل معنا مباشرة.</li>
      </ul>

      <h2>تحديثات هذه السياسة</h2>
      <p>قد نقوم بتحديث سياسة الخصوصية هذه من وقت لآخر. سيظهر تاريخ آخر تحديث دائمًا أعلى هذه الصفحة.</p>

      <p>إذا كان لديك أي استفسار بخصوص خصوصيتك، تواصل معنا من خلال <a href="contact.html">صفحة اتصل بنا</a>.</p>
    `
  },
  en: {
    brand: 'Egydahab<span class="sub">إيجي دهب</span>',
    contactLabel: 'Contact',
    menuHome: 'Home', menuAbout: 'About Us', menuArticles: 'Articles', menuOtherCurrencies: 'Other Currencies',
    menuContact: 'Contact', menuTerms: 'Terms & Conditions', menuDisclaimer: 'Disclaimer',
    back: '← Back to home',
    title: 'Privacy Policy',
    updatedLabel: 'Last updated: ',
    copyright: '© 2026 Egydahab. All rights reserved.',
    body: `
      <p>Welcome to Egydahab (إيجي دهب) — a site specialized in today's gold prices in Egypt and foreign currency exchange rates. This page describes how we handle your data when you use the site.</p>

      <h2>Information We Collect</h2>
      <ul>
        <li>General technical information such as device type, browser type, operating system, and approximate IP address (typically used only to estimate country/city, not your precise location).</li>
        <li>General usage data, such as pages visited and time spent, via standard analytics tools.</li>
        <li>Cookies, detailed below.</li>
      </ul>
      <p>We <strong>do not request or collect</strong> sensitive data such as your full name, phone number, or banking details through normal use of the site. Any email address you voluntarily share via the Contact page is used only to respond to your inquiry.</p>

      <h2>Cookies</h2>
      <p>We use two main types of cookies:</p>
      <ul>
        <li><strong>Necessary cookies:</strong> to run the site's basic functionality (such as remembering your Arabic/English language choice).</li>
        <li><strong>Advertising and analytics cookies:</strong> used by Google AdSense and analytics tools to display relevant ads and understand how visitors use the site.</li>
      </ul>
      <p>You can delete or block cookies from your browser settings at any time, though this may affect some site functionality.</p>

      <h2>How We Use This Information</h2>
      <ul>
        <li>To display gold and currency prices accurately and up to date.</li>
        <li>To analyze visitor traffic, understand which content is useful, and improve the user experience.</li>
        <li>To display ads through the Google AdSense program and measure their performance.</li>
        <li>To respond to inquiries submitted through the Contact page.</li>
      </ul>

      <h2>Third-Party Services & Data Sources</h2>
      <p>To display prices, the site relies on public financial data feeds (gold and currency rate sources) that do not include any personal data about you. For advertising, we use Google AdSense. Google may collect certain data in accordance with its own privacy policy, which you can review here: <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a></p>

      <h2>Data Retention</h2>
      <p>General usage and visit data is retained only as long as necessary for performance analysis and site improvement. Contact emails are retained only as long as necessary to respond to and follow up on your inquiry.</p>

      <h2>Children's Privacy</h2>
      <p>This site is not directed at children under 13, and we do not knowingly collect personal data from children. If you are a parent and believe your child has provided us with data, please contact us so we can remove it.</p>

      <h2>Data Sharing</h2>
      <ul>
        <li>We do not sell any personal data to any third party.</li>
        <li>We may share non-personal, aggregated data with technical partners for advertising and analytics purposes only.</li>
      </ul>

      <h2>Your Rights</h2>
      <ul>
        <li>You can manage or disable cookies from your browser settings at any time.</li>
        <li>You can request to know or delete any personal data you've voluntarily shared with us (such as your email via the contact form) by reaching out directly.</li>
      </ul>

      <h2>Changes to This Policy</h2>
      <p>We may update this privacy policy from time to time. The last-updated date will always appear at the top of this page.</p>

      <p>If you have any questions about your privacy, contact us through the <a href="contact.html">Contact page</a>.</p>
    `
  }
};
let lang = 'ar';
function formatToday(){
  const d = new Date();
  return lang === 'ar'
    ? d.toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'})
    : d.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
}
function applyLang(){
  const t = dict[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t[el.getAttribute('data-i18n')];
  });
  document.getElementById('langBtn').textContent = lang === 'ar' ? 'EN' : 'AR';
  document.getElementById('policyContent').innerHTML = t.body;
  document.getElementById('updatedDate').textContent = formatToday();
}
document.getElementById('langBtn').onclick = () => { lang = lang === 'ar' ? 'en' : 'ar'; applyLang(); };
document.getElementById('menuBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('menuDropdown').classList.toggle('open'); };
document.addEventListener('click', (e) => {
  const dropdown = document.getElementById('menuDropdown');
  const btn = document.getElementById('menuBtn');
  if(dropdown.classList.contains('open') && !dropdown.contains(e.target) && e.target !== btn){ dropdown.classList.remove('open'); }
});
applyLang();
</script>
